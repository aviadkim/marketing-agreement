<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <title>הסכם שיווק - סיכום והגשה</title>
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="form-card">
            <header class="form-header">
                <h1>סיכום והגשה</h1>
            </header>
            
            <main class="form-content">
                <form id="section4-form" class="form-section">
                    <!-- Checkboxes -->
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="finalConfirmation" name="finalConfirmation" required>
                            <label for="finalConfirmation">אני מאשר/ת שכל הפרטים נכונים</label>
                        </div>
                    </div>

                    <!-- Signature -->
                    <div class="signature-section">
                        <div class="signature-container">
                            <canvas id="signatureCanvas" class="signature-canvas"></canvas>
                            <div class="signature-controls">
                                <button type="button" class="btn-secondary" data-clear-signature>נקה חתימה</button>
                                <button type="button" class="btn-secondary" data-copy-signature>הדבק חתימה קודמת</button>
                            </div>
                            <input type="hidden" id="signatureData" name="signature" required>
                        </div>
                    </div>

                    <!-- Navigation -->
                    <footer class="form-navigation">
                        <button type="button" id="btnBack" class="btn-prev">חזור</button>
                        <button type="button" id="finalSubmit" class="btn-submit">סיים והגש טופס</button>
                    </footer>
                </form>
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@2.3.2/dist/signature_pad.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="/js/signatureHandler.js"></script>
    <script src="/js/section4Submit.js"></script>
    <script src="/js/storage.js"></script>
    <script src="/js/navigation.js"></script>
</body>
</html>
